# Database Configuration - Production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://your-db-host:3306/take_order_db}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf Configuration
spring.thymeleaf.cache=true

# Server
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_at_least_256_bits_long_key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.root=WARN
logging.level.com.restaurant=INFO