<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #f8f9fa, #e9ecef);
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .tables-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .table-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 200px;
      padding: 20px;
      transition: transform 0.2s;
    }

    .table-card:hover {
      transform: scale(1.05);
    }

    .table-id {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .status-available {
      color: green;
      font-weight: bold;
    }

    .status-occupied {
      color: red;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-assign {
      background-color: #27ae60;
      color: white;
    }

    .btn-order {
      background-color: #2980b9;
      color: white;
    }
  </style>
</head>
<body>
  <h1>🍽️ Welcome to the Restaurant</h1>
  <div class="tables-container" id="tables"></div>

<script>
function loadTables() {
  fetch("/restaurant/api/tables")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("tables");
      container.innerHTML = "";
      data.forEach(table => {
        const card = document.createElement("div");
        card.className = "table-card";

        const id = document.createElement("div");
        id.className = "table-id";
        id.textContent = `Table ${table.id}`;
        card.appendChild(id);

        const status = document.createElement("div");
        status.textContent = table.status;
        status.className = table.status.toUpperCase() === "AVAILABLE" ? "status-available" : "status-occupied";
        card.appendChild(status);

        const btn = document.createElement("button");
        if (table.status.toUpperCase() === "AVAILABLE") {
          btn.textContent = "Assign Customer";
          btn.className = "btn-assign";
          btn.onclick = () => window.location.href = `customer.html?tableId=${table.id}`;
        } else {
          btn.textContent = "Place Order";
          btn.className = "btn-order";
          btn.onclick = () => window.location.href = `order.html?tableId=${table.id}`;
        }
        card.appendChild(btn);

        container.appendChild(card);
      });
    });
}

loadTables();
</script>
</body>
</html>
